export_backend:
  api: /api/project/$project_id/exportBackend
  method: post
  multipart_form:
    subtitleJson: $subtitle_json
    headers: $export_headers
    resolution: $resolution
    lipSync: $lip_sync
    deviceType: $device_type
  headers:
    Cookie: $cookie

project_point:
  api: /api/project/$project_id/projectPoint
  method: post
  json:
    sessionId: $session_id
  headers:
    Content-Type: application/json
    Cookie: $cookie
    authorization: $authorization

export_front:
  api: /api/project/$project_id/exportFront
  method: post
  json:
    sessionId: $session_id
  headers:
    Content-Type: application/json
    Cookie: $cookie
    authorization: $authorization

get_export_progress:
  api: /api/project/$project_id/exportProgress
  method: get
  params:
    version: $version
    sessionId: $session_id
  headers:
    Content-Type: application/json
    Cookie: $cookie
