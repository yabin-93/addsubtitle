update_video:
  api: /api/project/$project_id/updateVideo
  method: post
  json:
    sessionId: $session_id
    list: $video_list
  headers:
    Content-Type: "application/json"
    Cookie: $cookie

drag_subtitle:
  api: /api/project/$project_id/batchEditSubtitle
  method: post
  json:
    sessionId: $session_id
    list: $subtitle_list
  headers:
    Content-Type: "application/json"
    Cookie: $cookie